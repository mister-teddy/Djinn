type Query {
  settings: Settings!
  account: Account!
  models(provider: String, refresh: Boolean): ModelCatalog!
  operations: OperationsReport!
  usage: Usage!
  chats: [Chat!]!
  chat(id: Int!): ChatDetail
}

type Settings {
  edition: String!
  isPro: Boolean!
  provider: String!
  chatModel: String
  hasApiKey: Boolean!
  hasSiteToken: Boolean!
  usesProxy: Boolean!
  configured: Boolean!
}

type Account {
  usesProxy: Boolean!
  connected: Boolean
  balanceUsd: Float
  spentUsd: Float
  paid: Boolean
  subscribed: Boolean
}

type ModelCatalog {
  chat: [ChatModel!]!
  live: Boolean!
  error: String
}

type ChatModel {
  id: String!
  tier: String
  price: String
}

type OperationsReport {
  operations: [Operation!]!
}

type Operation {
  domain: String!
  name: String!
  kind: String!
  description: String
  args: [OpArg!]!
  returns: String
}

type OpArg {
  name: String!
  type: String!
  required: Boolean!
}

type Usage {
  totals: UsageTotals!
  byModel: [UsageByModel!]!
  byDay: [UsageByDay!]!
  recent: [UsageRecent!]!
  account: Account
}

type UsageTotals {
  calls: Int!
  prompt: Int!
  completion: Int!
  cost: Float!
  hasEstimates: Boolean!
}

type UsageByModel {
  provider: String
  model: String
  kind: String
  calls: Int!
  prompt: Int!
  completion: Int!
  cost: Float!
  estimated: Boolean!
}

type UsageByDay {
  day: String!
  calls: Int!
  cost: Float!
}

type UsageRecent {
  createdAt: String
  provider: String
  model: String
  kind: String
  promptTokens: Int!
  completionTokens: Int!
  estimated: Boolean!
  cost: Float!
}

type Chat {
  id: Int!
  title: String
  createdAt: String
}

type ChatDetail {
  chatId: Int!
  messages: [ChatMessage!]!
  usage: ChatUsage!
}

type ChatMessage {
  role: String!
  content: String
  attachments: [Attachment!]
  kind: String
  status: String
  operation: String
  variables: JSON
  summary: String
  message: String
  result: JSON
  pendingId: Int
}

type Attachment {
  filename: String
  token: String
  size: Int
  mime: String
}

"""Arbitrary JSON (a GraphQL operation's variables or result)."""
scalar JSON

type ChatUsage {
  prompt: Int!
  completion: Int!
  tokens: Int!
  cost: Float!
  calls: Int!
}

type Mutation {
  saveSettings(input: SettingsInput!): Settings!
  connect: Account!
  activateLicense(key: String!): Settings!
  deactivateLicense: Settings!
  resetUsage: Boolean!
  billingCheckout(kind: BillingKind!): CheckoutSession!
  deleteChat(id: Int!): Boolean!
}

input SettingsInput {
  provider: String
  apiKey: String
  chatModel: String
  siteToken: String
}

enum BillingKind {
  credit
  subscription
}

type CheckoutSession {
  url: String!
}